# ============================================================
# Weather Dashboard — CI/CD Pipeline
# ============================================================
#
# Pipeline structure (parallel where possible):
#
#   ┌─────────┐   ┌─────────┐
#   │  lint   │   │  lint   │
#   │ server  │   │ client  │      ← Step 1: Lint (parallel)
#   └────┬────┘   └────┬────┘
#        │             │
#   ┌────┴────┐   ┌────┴────┐
#   │  test   │   │  test   │      ← Step 2: Test (parallel)
#   │ server  │   │ client  │
#   └────┬────┘   └────┬────┘
#        │             │
#        │        ┌────┴────┐
#        │        │  build  │      ← Step 3: Build frontend
#        │        │ client  │
#        │        └────┬────┘
#        │             │
#        └──────┬──────┘
#          ┌────┴────┐
#          │ deploy  │             ← Step 4: Deploy
#          └─────────┘
#
# Optimisations:
#   • npm dependency caching via actions/setup-node cache
#   • Parallel lint jobs (server + client)
#   • Parallel test jobs (server + client)
#   • Build only runs after client tests pass
#   • Deploy only runs on main branch pushes
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
# JOBS
# ============================================================

jobs:
  # ──────────────────────────────────────────────────────────
  # STEP 1a: Lint Server (Node.js / Express)
  # ──────────────────────────────────────────────────────────
  lint-server:
    name: 🔍 Lint Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js with dependency cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ──────────────────────────────────────────────────────────
  # STEP 1b: Lint Client (React / Vite)
  # ──────────────────────────────────────────────────────────
  lint-client:
    name: 🔍 Lint Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js with dependency cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  # ──────────────────────────────────────────────────────────
  # STEP 2a: Test Server (Jest + Supertest)
  # ──────────────────────────────────────────────────────────
  test-server:
    name: 🧪 Test Server
    needs: lint-server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js with dependency cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test
        env:
          # Provide a dummy API key for tests (tests mock Axios)
          OPENWEATHER_API_KEY: test_ci_key_not_real

  # ──────────────────────────────────────────────────────────
  # STEP 2b: Test Client (Jest + jsdom)
  # ──────────────────────────────────────────────────────────
  test-client:
    name: 🧪 Test Client
    needs: lint-client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js with dependency cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Jest tests
        run: npm test

  # ──────────────────────────────────────────────────────────
  # STEP 3: Build React Frontend
  # ──────────────────────────────────────────────────────────
  build-client:
    name: 🏗️ Build Client
    needs: test-client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js with dependency cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # STEP 4: Deploy to Cloud
  # ──────────────────────────────────────────────────────────
  #
  # This job only runs on pushes to `main` (not PRs, not develop).
  # It deploys:
  #   - The React frontend (static files) to a hosting service
  #   - The Node.js backend to a cloud platform
  #
  # ⚠️  Configure your deployment targets by uncommenting the
  #     relevant provider section below and adding the required
  #     secrets in GitHub → Settings → Secrets → Actions.
  # ──────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    needs: [test-server, build-client]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download client build artifacts
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: client/dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server production dependencies
        working-directory: server
        run: npm ci --omit=dev

      # ──────────────────────────────────────────────────────
      # OPTION A: Deploy to Render.com
      # ──────────────────────────────────────────────────────
      # Uncomment and add RENDER_API_KEY + RENDER_SERVICE_ID secrets
      #
      # - name: Deploy Backend to Render
      #   env:
      #     RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      #     RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      #   run: |
      #     curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
      #       -H "Authorization: Bearer $RENDER_API_KEY" \
      #       -H "Content-Type: application/json"

      # ──────────────────────────────────────────────────────
      # OPTION B: Deploy frontend to Netlify
      # ──────────────────────────────────────────────────────
      # Uncomment and add NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID secrets
      #
      # - name: Deploy Frontend to Netlify
      #   uses: nwtgck/actions-netlify@v3
      #   with:
      #     publish-dir: client/dist
      #     production-deploy: true
      #   env:
      #     NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      #     NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      # ──────────────────────────────────────────────────────
      # OPTION C: Deploy frontend to Vercel
      # ──────────────────────────────────────────────────────
      # Uncomment and add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
      #
      # - name: Deploy Frontend to Vercel
      #   uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     working-directory: client

      # ──────────────────────────────────────────────────────
      # Placeholder summary (active by default)
      # ──────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "============================================"
          echo "🚀 Deployment Ready!"
          echo "============================================"
          echo ""
          echo "Build artifacts:"
          echo "  • client/dist/ — $(du -sh client/dist | cut -f1) production bundle"
          echo "  • server/     — $(ls server/node_modules | wc -l) production packages"
          echo ""
          echo "To enable automatic deployment, uncomment one of"
          echo "the provider sections in .github/workflows/ci.yml"
          echo "and add the required secrets."
          echo "============================================"
